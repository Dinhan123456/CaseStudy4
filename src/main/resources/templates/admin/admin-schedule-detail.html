<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết lịch học - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/admin/admin-panel.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="admin/admin-panel :: navbar"></div>
    
    <div class="container-fluid">
        <div class="row">
            <div th:replace="admin/admin-panel :: sidebar"></div>
            
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">
                        <i class="fas fa-calendar-alt"></i> Chi tiết lịch học
                    </h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <a th:href="@{/admin/schedules}" class="btn btn-secondary me-2">
                            <i class="fas fa-arrow-left"></i> Quay lại
                        </a>
                        <a th:href="@{/admin/schedules/{id}/edit(id=${schedule.id})}" class="btn btn-warning me-2">
                            <i class="fas fa-edit"></i> Chỉnh sửa
                        </a>
                        <button type="button" class="btn btn-success me-2" 
                                th:if="${schedule.status == T(com.codegym.module4casestudy.model.ScheduleStatus).PENDING}"
                                th:onclick="|confirmSchedule(${schedule.id})|">
                            <i class="fas fa-check"></i> Xác nhận
                        </button>
                        <button type="button" class="btn btn-danger" 
                                th:onclick="|cancelSchedule(${schedule.id})|">
                            <i class="fas fa-times"></i> Hủy lịch
                        </button>
                    </div>
                </div>

                <!-- Thông báo -->
                <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle"></i> <span th:text="${message}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-triangle"></i> <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Chi tiết lịch học -->
                <div class="row">
                    <div class="col-md-8">
                        <div class="card">
                            <div class="card-header">
                                <h5 class="mb-0">
                                    <i class="fas fa-info-circle"></i> Thông tin lịch học
                                </h5>
                            </div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-6">
                                        <table class="table table-borderless">
                                            <tr>
                                                <td><strong><i class="fas fa-book"></i> Môn học:</strong></td>
                                                <td th:text="${schedule.subject.subjectName}"></td>
                                            </tr>
                                            <tr>
                                                <td><strong><i class="fas fa-chalkboard-teacher"></i> Lớp học:</strong></td>
                                                <td th:text="${schedule.classEntity.className}"></td>
                                            </tr>
                                            <tr>
                                                <td><strong><i class="fas fa-user"></i> Giảng viên:</strong></td>
                                                <td th:text="${schedule.teacher.fullName}"></td>
                                            </tr>
                                            <tr>
                                                <td><strong><i class="fas fa-door-open"></i> Phòng học:</strong></td>
                                                <td th:text="${schedule.room.roomCode + ' - ' + schedule.room.roomName}"></td>
                                            </tr>
                                            <tr>
                                                <td><strong><i class="fas fa-users"></i> Sức chứa:</strong></td>
                                                <td th:text="${schedule.room.capacity + ' sinh viên'}"></td>
                                            </tr>
                                        </table>
                                    </div>
                                    <div class="col-md-6">
                                        <table class="table table-borderless">
                                            <tr>
                                                <td><strong><i class="fas fa-calendar-day"></i> Thứ trong tuần:</strong></td>
                                                <td th:text="${schedule.dayOfWeek == 1} ? 'Chủ nhật' : 'Thứ ' + ${schedule.dayOfWeek}"></td>
                                            </tr>
                                            <tr>
                                                <td><strong><i class="fas fa-clock"></i> Khung giờ:</strong></td>
                                                <td th:text="${schedule.timeSlot.slotName + ' (' + schedule.timeSlot.startTime + ' - ' + schedule.timeSlot.endTime + ')'}"></td>
                                            </tr>
                                            <tr>
                                                <td><strong><i class="fas fa-calendar-alt"></i> Ngày bắt đầu:</strong></td>
                                                <td th:text="${#temporals.format(schedule.startDate, 'dd/MM/yyyy')}"></td>
                                            </tr>
                                            <tr>
                                                <td><strong><i class="fas fa-calendar-check"></i> Ngày kết thúc:</strong></td>
                                                <td th:text="${schedule.endDate != null ? #temporals.format(schedule.endDate, 'dd/MM/yyyy') : 'Không xác định'}"></td>
                                            </tr>
                                            <tr>
                                                <td><strong><i class="fas fa-info"></i> Trạng thái:</strong></td>
                                                <td>
                                                    <span class="badge" 
                                                          th:classappend="${schedule.status == T(com.codegym.module4casestudy.model.ScheduleStatus).PENDING} ? 'bg-warning' : 
                                                                         (${schedule.status == T(com.codegym.module4casestudy.model.ScheduleStatus).CONFIRMED} ? 'bg-success' : 'bg-danger')"
                                                          th:text="${schedule.status == T(com.codegym.module4casestudy.model.ScheduleStatus).PENDING} ? 'Chờ xác nhận' : 
                                                                   (${schedule.status == T(com.codegym.module4casestudy.model.ScheduleStatus).CONFIRMED} ? 'Đã xác nhận' : 'Đã hủy')">
                                                    </span>
                                                </td>
                                            </tr>
                                        </table>
                                    </div>
                                </div>
                                
                                <div th:if="${schedule.notes}" class="mt-3">
                                    <h6><i class="fas fa-sticky-note"></i> Ghi chú:</h6>
                                    <p class="text-muted" th:text="${schedule.notes}"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-header">
                                <h6 class="mb-0">
                                    <i class="fas fa-info-circle"></i> Thông tin bổ sung
                                </h6>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <small class="text-muted">Loại phòng:</small><br>
                                    <span class="badge bg-info" th:text="${schedule.room.roomType}"></span>
                                </div>
                                
                                <div class="mb-3" th:if="${schedule.room.building}">
                                    <small class="text-muted">Tòa nhà:</small><br>
                                    <span th:text="${schedule.room.building + ' - Tầng ' + schedule.room.floor}"></span>
                                </div>
                                
                                <div class="mb-3" th:if="${schedule.room.equipment}">
                                    <small class="text-muted">Thiết bị:</small><br>
                                    <span th:text="${schedule.room.equipment}"></span>
                                </div>
                                
                                <div class="mb-3">
                                    <small class="text-muted">Người tạo:</small><br>
                                    <span th:text="${schedule.createdBy.fullName}"></span>
                                </div>
                                
                                <div class="mb-3">
                                    <small class="text-muted">Ngày tạo:</small><br>
                                    <span th:text="${#temporals.format(schedule.createdDate, 'dd/MM/yyyy HH:mm')}"></span>
                                </div>
                                
                                <div th:if="${schedule.updatedDate}">
                                    <small class="text-muted">Cập nhật cuối:</small><br>
                                    <span th:text="${#temporals.format(schedule.updatedDate, 'dd/MM/yyyy HH:mm')}"></span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Kiểm tra xung đột -->
                        <div class="card mt-3">
                            <div class="card-header">
                                <h6 class="mb-0">
                                    <i class="fas fa-exclamation-triangle"></i> Kiểm tra xung đột
                                </h6>
                            </div>
                            <div class="card-body">
                                <button type="button" class="btn btn-outline-warning btn-sm w-100" onclick="checkScheduleConflicts()">
                                    <i class="fas fa-search"></i> Kiểm tra xung đột
                                </button>
                                <div id="conflictResults" class="mt-2"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function confirmSchedule(scheduleId) {
            if (confirm('Bạn có chắc chắn muốn xác nhận lịch học này?')) {
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = `/admin/schedules/${scheduleId}/confirm`;
                document.body.appendChild(form);
                form.submit();
            }
        }

        function cancelSchedule(scheduleId) {
            if (confirm('Bạn có chắc chắn muốn hủy lịch học này?')) {
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = `/admin/schedules/${scheduleId}/cancel`;
                document.body.appendChild(form);
                form.submit();
            }
        }

        function checkScheduleConflicts() {
            const scheduleId = /*[[${schedule.id}]]*/ 0;
            const teacherId = /*[[${schedule.teacher.id}]]*/ 0;
            const roomId = /*[[${schedule.room.id}]]*/ 0;
            const classId = /*[[${schedule.classEntity.id}]]*/ 0;
            const dayOfWeek = /*[[${schedule.dayOfWeek}]]*/ 0;
            const timeSlotId = /*[[${schedule.timeSlot.id}]]*/ 0;
            const startDate = /*[[${#temporals.format(schedule.startDate, 'yyyy-MM-dd')}]]*/ '';
            const endDate = /*[[${schedule.endDate != null ? #temporals.format(schedule.endDate, 'yyyy-MM-dd') : ''}]]*/ '';
            
            const formData = new FormData();
            formData.append('teacherId', teacherId);
            formData.append('roomId', roomId);
            formData.append('classId', classId);
            formData.append('dayOfWeek', dayOfWeek);
            formData.append('timeSlotId', timeSlotId);
            formData.append('startDate', startDate);
            if (endDate) formData.append('endDate', endDate);
            
            fetch('/admin/schedules/check-conflict', {
                method: 'POST',
                body: formData
            })
            .then(response => response.text())
            .then(result => {
                const resultsDiv = document.getElementById('conflictResults');
                if (result === 'conflict') {
                    resultsDiv.innerHTML = '<div class="alert alert-danger alert-sm"><i class="fas fa-exclamation-triangle"></i> Có xung đột lịch!</div>';
                } else if (result === 'ok') {
                    resultsDiv.innerHTML = '<div class="alert alert-success alert-sm"><i class="fas fa-check"></i> Không có xung đột.</div>';
                } else {
                    resultsDiv.innerHTML = '<div class="alert alert-warning alert-sm"><i class="fas fa-question"></i> Lỗi kiểm tra.</div>';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('conflictResults').innerHTML = '<div class="alert alert-danger alert-sm">Lỗi kết nối!</div>';
            });
        }
    </script>
</body>
</html>
