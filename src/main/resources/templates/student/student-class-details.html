<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết lớp học</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <h3 class="mb-3">Chi tiết lớp học</h3>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card">
        <div class="card-body">
            <h5 class="card-title" th:text="${clazz != null ? clazz.name : 'Tên lớp'}">Tên lớp</h5>
            <p class="card-text mb-1"><strong>Mô tả:</strong> <span th:text="${clazz != null ? clazz.description : 'Chưa có'}">Chưa có</span></p>
            <p class="card-text mb-1"><strong>Số sinh viên:</strong> <span th:text="${clazz != null && clazz.students != null ? clazz.students.size() : 0}">0</span></p>
            <p class="card-text mb-1"><strong>Đã đăng ký:</strong> <span th:text="${isEnrolled} ? 'Có' : 'Chưa'"></span></p>
        </div>
    </div>

    <div class="mt-3">
        <a th:href="@{/student/classes}" class="btn btn-secondary">Quay lại danh sách</a>
    </div>
</div>
</body>
</html>
