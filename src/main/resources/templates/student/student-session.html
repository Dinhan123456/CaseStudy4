<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Check - Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>Session Check - Student</h2>
    
    <div class="card mb-3">
        <div class="card-header">
            <h5>Authentication Info</h5>
        </div>
        <div class="card-body">
            <p><strong>Auth Name:</strong> <span th:text="${authName}">null</span></p>
            <p><strong>Auth Details:</strong> <span th:text="${authDetails}">null</span></p>
            <p><strong>Auth Authorities:</strong> <span th:text="${authAuthorities}">null</span></p>
        </div>
    </div>
    
    <div class="card mb-3">
        <div class="card-header">
            <h5>Student Info</h5>
        </div>
        <div class="card-body">
            <p><strong>Student:</strong> <span th:text="${student != null ? student.fullName : 'null'}">null</span></p>
            <p><strong>Student ID:</strong> <span th:text="${student != null ? student.id : 'null'}">null</span></p>
            <p><strong>Student Username:</strong> <span th:text="${student != null ? student.username : 'null'}">null</span></p>
            <p><strong>Student Role:</strong> <span th:text="${student != null ? student.role : 'null'}">null</span></p>
        </div>
    </div>
    
    <div class="card mb-3">
        <div class="card-header">
            <h5>Navigation Test</h5>
        </div>
        <div class="card-body">
            <a href="/student/dashboard" class="btn btn-primary me-2">Go to Dashboard</a>
            <a href="/student/profile" class="btn btn-secondary me-2">Go to Profile</a>
            <a href="/student/classes" class="btn btn-info me-2">Go to Classes</a>
            <a href="/student/grades" class="btn btn-success me-2">Go to Grades</a>
            <a href="/student/schedule" class="btn btn-warning me-2">Go to Schedule</a>
        </div>
    </div>
</div>
</body>
</html>
